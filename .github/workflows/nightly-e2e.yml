name: Nightly E2E (staging)

on:
  schedule:
    # Every 6 hours — gives us 4 runs/day so a flake is obvious within one cycle.
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run e2e
        env:
          STAGING_RELAY_URL: ${{ secrets.STAGING_RELAY_URL }}
          STAGING_TOKEN_ENDPOINT: ${{ secrets.STAGING_TOKEN_ENDPOINT }}
          E2E_USER_API_KEY: ${{ secrets.E2E_USER_API_KEY }}
          STAGING_BYPASS_TOKEN: ${{ secrets.STAGING_BYPASS_TOKEN }}
        run: bun run test/e2e-staging.ts
