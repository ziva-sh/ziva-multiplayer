name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Write .dev.vars for type generation
        # wrangler types reads .dev.vars to know which secret bindings exist.
        # Value is throwaway — tests sign+verify with the same secret.
        run: echo 'MULTIPLAYER_JWT_SECRET="ci-test-secret-not-used-in-prod"' > .dev.vars

      - name: Generate worker types
        run: bun run types

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Test
        run: bun run test
