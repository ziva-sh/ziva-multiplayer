name = "ziva-multiplayer"
main = "src/index.ts"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

# Hibernation API requires the Durable Object to be class-bound and listed in
# new_sqlite_classes so its state is durable across hibernation.
[[durable_objects.bindings]]
name = "ROOM"
class_name = "RoomDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomDO"]

# Analytics Engine for usage metrics (peer connects, bytes in/out).
[[analytics_engine_datasets]]
binding = "MULTIPLAYER_EVENTS"
dataset = "multiplayer"

# KV namespace for soft/hard cap throttling. Populated by Phase 6.
# Placeholder id — Phase 3 replaces with the real namespace id before deploy.
[[kv_namespaces]]
binding = "CAPS_KV"
id = "placeholder_replace_in_phase_3"

# MULTIPLAYER_JWT_SECRET is a secret (wrangler secret put), not a [vars] entry.
# Local tests read it from .dev.vars (gitignored).

# ---- Staging environment ----
# Deployed via `wrangler deploy --env staging`. Hostname is the default
# *.workers.dev — ziva.sh DNS is at Namecheap so we can't easily attach a
# custom domain (out of scope for v1).
[env.staging]
name = "ziva-multiplayer-staging"

[[env.staging.durable_objects.bindings]]
name = "ROOM"
class_name = "RoomDO"

[[env.staging.migrations]]
tag = "v1"
new_sqlite_classes = ["RoomDO"]

# Analytics Engine — staging writes to the same dataset as prod; rollup cron
# filters by environment if needed.
[[env.staging.analytics_engine_datasets]]
binding = "MULTIPLAYER_EVENTS"
dataset = "multiplayer"

[[env.staging.kv_namespaces]]
binding = "CAPS_KV"
id = "05063c1c30b84492ac866e24de1cb36b"

# LOG_DRAIN_URL is plain text — POSTed-to by room-do for structured events.
# Empty default means "no log drain"; the Worker no-ops cleanly when unset.
[env.staging.vars]
LOG_DRAIN_URL = ""

# ---- Production environment ----
[env.production]
name = "ziva-multiplayer"

[[env.production.durable_objects.bindings]]
name = "ROOM"
class_name = "RoomDO"

[[env.production.migrations]]
tag = "v1"
new_sqlite_classes = ["RoomDO"]

[[env.production.analytics_engine_datasets]]
binding = "MULTIPLAYER_EVENTS"
dataset = "multiplayer"

[[env.production.kv_namespaces]]
binding = "CAPS_KV"
id = "fbc3ed699aa546e5bbf905cdf9963821"

[env.production.vars]
LOG_DRAIN_URL = ""
