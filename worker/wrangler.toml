name = "ziva-multiplayer"
main = "src/index.ts"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

# Hibernation API requires the Durable Object to be class-bound and listed in
# new_sqlite_classes so its state is durable across hibernation.
[[durable_objects.bindings]]
name = "ROOM"
class_name = "RoomDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomDO"]

# Analytics Engine for usage metrics (peer connects, bytes in/out).
# REQUIRES one-time account enablement; see env.staging.analytics_engine_datasets
# comment below for details. Re-enable once Bob clicks the dashboard button.
# [[analytics_engine_datasets]]
# binding = "MULTIPLAYER_EVENTS"
# dataset = "ziva_multiplayer_events"

# KV namespace for soft/hard cap throttling. Populated by Phase 6.
# Placeholder id — Phase 3 replaces with the real namespace id before deploy.
[[kv_namespaces]]
binding = "CAPS_KV"
id = "placeholder_replace_in_phase_3"

# MULTIPLAYER_JWT_SECRET is a secret (wrangler secret put), not a [vars] entry.
# Local tests read it from .dev.vars (gitignored).

# ---- Staging environment ----
# Deployed via `wrangler deploy --env staging`. Hostname is the default
# *.workers.dev — ziva.sh DNS is at Namecheap so we can't easily attach a
# custom domain (out of scope for v1).
[env.staging]
name = "ziva-multiplayer-staging"

[[env.staging.durable_objects.bindings]]
name = "ROOM"
class_name = "RoomDO"

[[env.staging.migrations]]
tag = "v1"
new_sqlite_classes = ["RoomDO"]

# Analytics Engine — staging dataset. Phase 6 wires the rollup cron that reads
# from this dataset via the CF SQL API.
#
# REQUIRES one-time per-account enablement at:
#   https://dash.cloudflare.com/ace16bc379f57059ee9b9afd2df8b99a/workers/analytics-engine
# (Bob has to click the green "Enable" button — the OAuth wrangler token
# can't enable AE programmatically, only consume it once enabled.)
# After enabling, uncomment the binding and re-run `wrangler deploy --env staging`.
# [[env.staging.analytics_engine_datasets]]
# binding = "MULTIPLAYER_EVENTS"
# dataset = "ziva_multiplayer_events_staging"

[[env.staging.kv_namespaces]]
binding = "CAPS_KV"
id = "05063c1c30b84492ac866e24de1cb36b"

# LOG_DRAIN_URL is plain text — POSTed-to by room-do for structured events.
# Empty default means "no log drain"; the Worker no-ops cleanly when unset.
[env.staging.vars]
LOG_DRAIN_URL = ""

# ---- Production environment ----
[env.production]
name = "ziva-multiplayer"

[[env.production.durable_objects.bindings]]
name = "ROOM"
class_name = "RoomDO"

[[env.production.migrations]]
tag = "v1"
new_sqlite_classes = ["RoomDO"]

# See env.staging.analytics_engine_datasets comment — same enablement required.
# [[env.production.analytics_engine_datasets]]
# binding = "MULTIPLAYER_EVENTS"
# dataset = "ziva_multiplayer_events"

# Prod CAPS_KV must be created via `wrangler kv namespace create CAPS_KV --env production`
# before first prod deploy and the id pasted here.
[[env.production.kv_namespaces]]
binding = "CAPS_KV"
id = "placeholder_create_before_prod_deploy"

[env.production.vars]
LOG_DRAIN_URL = ""
